{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<section class="dashboard-section">
    <div class="container">
        <div class="dashboard-card">
            <span class="badge text-bg-success mb-3">Logged in</span>
            <h1 class="h3 fw-bold">Welcome, {{ user.username }}</h1>
            <p class="text-muted mb-4">You are viewing a protected dashboard page.</p>
            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-primary" href="{% url 'logout' %}">Logout</a>
                {% if user.is_staff %}
                    <a class="btn btn-outline-dark" href="/admin/">Open Admin Panel</a>
                {% endif %}
            </div>
        </div>
    </div>    
</section>
{% endblock %}
