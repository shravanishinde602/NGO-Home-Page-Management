{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
<section class="hero-section">
    <div class="container">
        <div class="row justify-content-center text-center">
            <div class="col-lg-8">
                <h1 class="display-5 fw-bold">User login and registration</h1>
                <p class="lead text-muted mt-3">Create an account, sign in securely.</p>
                <div class="d-flex flex-wrap gap-3 mt-4">
                    <a class="btn btn-primary btn-lg" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-outline-dark btn-lg" href="{% url 'register' %}">Register</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
