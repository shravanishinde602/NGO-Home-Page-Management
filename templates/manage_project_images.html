{% extends "manage_base.html" %}
{% block table %}
<h5 class="fw-bold mb-3">Project Gallery Images</h5>
{% for item in items %}
<div class="admin-list-item"><div><strong>{{ item.project.title }}</strong><div class="text-muted small">{{ item.caption|default:"No caption" }} | {{ item.uploaded_at|date:"d M Y" }}</div></div><div><a class="btn btn-sm btn-outline-success" href="?edit={{ item.id }}">Edit</a><form method="post" class="d-inline">{% csrf_token %}<input type="hidden" name="delete_id" value="{{ item.id }}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></div></div>
{% empty %}<p class="text-muted">No gallery images added yet.</p>{% endfor %}
{% endblock %}
