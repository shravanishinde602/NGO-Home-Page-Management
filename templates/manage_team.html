{% extends "manage_base.html" %}
{% block table %}
<h5 class="fw-bold mb-3">Team Members</h5>
{% for item in items %}
<div class="admin-list-item"><div><strong>{{ item.name }}</strong><div class="text-muted small">{{ item.role }} | Order {{ item.order }} | {% if item.status %}Active{% else %}Hidden{% endif %}</div></div><div><a class="btn btn-sm btn-outline-success" href="?edit={{ item.id }}">Edit</a><form method="post" class="d-inline">{% csrf_token %}<input type="hidden" name="delete_id" value="{{ item.id }}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></div></div>
{% empty %}<p class="text-muted">No team members added yet.</p>{% endfor %}
{% endblock %}
