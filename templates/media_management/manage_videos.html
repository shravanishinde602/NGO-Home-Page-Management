{% extends "base.html" %}
{% block title %}Manage Videos{% endblock %}
{% block content %}
<section class="dashboard-section">
    <div class="container">
        <div class="dashboard-card mb-4">
            <h1 class="h4 fw-bold">Add Video</h1>
            <form method="post" class="mt-3">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary" type="submit">Save Video</button>
            </form>
        </div>
        <div class="row g-4">
            {% for video in videos %}
                <div class="col-md-6">
                    <div class="video-card h-100">
                        <div class="ratio ratio-16x9">
                            <iframe src="{{ video.embed_url }}" title="{{ video.item.description|default:'NGO video' }}" allowfullscreen></iframe>
                        </div>
                        <p class="fw-semibold mt-3">{{ video.item.description|default:"Video" }}</p>
                        <form method="post" action="{% url 'delete_video' video.item.pk %}">
                            {% csrf_token %}
                            <button class="btn btn-outline-danger btn-sm" type="submit">Delete</button>
                        </form>
                    </div>
                </div>
            {% empty %}
                <p class="text-muted">No videos added yet.</p>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
